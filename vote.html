<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即時投票 · AI 建站一日營</title>
<style>
  :root{
    --stage:#0e0d12; --panel:#17151d; --panel2:#201d29; --line:#2c2836;
    --ink:#ffffff; --muted:#a5a1b3; --radius:18px;
    /* 選項四色（A/B/C/D）——Kahoot 語彙，自己的調 */
    --c0:#ff3366; --c1:#2f7bff; --c2:#22c55e; --c3:#ffb300;
    --c4:#ff6ac1; --c5:#7c5cff; /* 5+ 選項備援色 */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:system-ui,"Microsoft JhengHei","PingFang TC",sans-serif;
    color:var(--ink); line-height:1.4; -webkit-font-smoothing:antialiased;
    background:var(--stage);
    /* 極淡 vignette：舞台感，不用霓虹漸層 */
    background-image:radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,.045), transparent 55%),
                     radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,.55), transparent 60%);
    background-attachment:fixed;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:20px 22px 60px;}
  button{font-family:inherit; cursor:pointer;}
  .hidden{display:none !important;}

  /* ===== 示範模式橫幅（重新配色，訊息保留） ===== */
  .banner{
    background:linear-gradient(90deg,#3a2a00,#4a3500); color:#ffd23f;
    border-bottom:1px solid #6b5400; padding:11px 16px; font-size:15px;
    text-align:center; letter-spacing:.3px;
  }

  h1{font-size:clamp(24px,3.2vw,36px); font-weight:900; margin:0; letter-spacing:.5px;}
  h1 .hl{color:var(--c3);}
  .sub{color:var(--muted); font-size:15px; margin:6px 0 20px;}

  /* ===== 老師佈局 ===== */
  .host-grid{display:grid; grid-template-columns:280px 1fr; gap:22px;}
  /* 側欄收合：投影時全螢幕留給舞台 */
  #host.side-collapsed .host-grid{grid-template-columns:1fr;}
  #host.side-collapsed .panel.side{display:none;}
  .ptitle .fold{
    float:right; background:none; border:1px solid var(--line); color:var(--muted);
    border-radius:8px; font-size:13px; padding:3px 10px; cursor:pointer;
  }
  .reopen{
    display:none; position:fixed; left:12px; top:12px; z-index:30;
    background:var(--panel); border:1px solid var(--line); color:#e7e4f0;
    border-radius:10px; font-size:15px; padding:8px 14px; cursor:pointer;
  }
  #host.side-collapsed .reopen{display:inline-block;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px;}
  .panel .ptitle{font-weight:800; margin-bottom:12px; font-size:16px; color:#e7e4f0;}
  .qlist{list-style:none; margin:0; padding:0; max-height:360px; overflow:auto;}
  .qlist li{
    padding:11px 13px; border:1px solid var(--line); border-radius:12px; margin-bottom:8px;
    font-size:15px; background:var(--panel2); cursor:pointer; transition:border-color .15s, transform .1s;
  }
  .qlist li:hover{border-color:var(--c1); transform:translateX(2px);}
  .qlist li.sel{border-color:var(--c3); background:rgba(255,179,0,.12);}
  .qlist .tag{font-size:12px; letter-spacing:1.5px; color:var(--c3); font-weight:700;}
  textarea{
    width:100%; min-height:92px; background:var(--panel2); color:var(--ink);
    border:1px solid var(--line); border-radius:12px; padding:11px; font-size:15px; font-family:inherit;
  }
  .hint{color:var(--muted); font-size:14px; margin:8px 0 0;}

  .stage{min-height:460px; display:flex; flex-direction:column;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:22px;}

  /* 計分板膠囊 */
  .stat-row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px;}
  .pill{
    display:flex; align-items:center; gap:8px; background:var(--panel2);
    border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:14px; color:var(--muted);
  }
  .pill b{color:var(--ink); font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1;}
  .pill.live b{color:#ff5470;}
  .pill .dot{width:9px;height:9px;border-radius:50%;background:#ff5470;box-shadow:0 0 8px #ff5470;
    animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* 超大題目 */
  .bigq{font-size:clamp(28px,3.6vw,46px); font-weight:900; margin:4px 0 24px; line-height:1.22; color:#fff;}

  /* 節目感按鈕 */
  .btn{
    border:none; border-radius:14px; padding:16px 30px; font-size:20px; font-weight:800;
    background:linear-gradient(180deg,#ffc53d,#ffb300); color:#241a00;
    box-shadow:0 8px 0 #b87f00, 0 12px 28px rgba(255,179,0,.28); transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 4px 0 #b87f00, 0 6px 16px rgba(255,179,0,.28);}
  .btn.big{font-size:26px; padding:20px 48px;}
  .btn.ghost{background:transparent; color:var(--ink); border:2px solid var(--line);
    box-shadow:none; font-weight:700;}
  .btn.ghost:active{transform:translateY(2px);}
  .btn:disabled{opacity:.35; cursor:default; box-shadow:none; transform:none;}
  .btn-row{display:flex; gap:14px; flex-wrap:wrap; margin-top:22px;}

  /* ===== 出題中：選項色條預覽（未開牌） ===== */
  .prebars{display:flex; flex-direction:column; gap:12px; margin-top:6px;}
  .prebar{
    display:flex; align-items:center; gap:16px; border-radius:14px; padding:16px 20px;
    color:#fff; font-size:22px; font-weight:800; box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
  }
  .prebar .kk{
    flex:0 0 auto; font-size:26px; font-weight:900; width:40px; text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.35);
  }

  /* ===== 結果：長條圖（3+ 選項） ===== */
  .bars{display:flex; flex-direction:column; gap:16px; margin-top:6px;}
  .bar-item{position:relative;}
  .bar-track{
    position:relative; height:64px; border-radius:14px; overflow:hidden;
    background:var(--panel2); box-shadow:inset 0 0 0 1px var(--line);
    display:flex; align-items:center;
  }
  .bar-fill{
    position:absolute; left:0; top:0; bottom:0; width:0;
    border-radius:14px; transition:width .8s cubic-bezier(.2,.8,.2,1);
  }
  .bar-lab{
    position:relative; z-index:2; display:flex; align-items:center; gap:14px;
    padding:0 20px; width:100%; font-weight:800;
  }
  .bar-lab .kk{font-size:30px; font-weight:900; width:34px; text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .bar-lab .opt{font-size:24px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .bar-lab .num{display:flex; align-items:baseline; gap:8px; text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .bar-lab .num .v{font-size:64px; font-weight:900; line-height:1; font-variant-numeric:tabular-nums;}
  .bar-lab .num .u{font-size:16px; color:rgba(255,255,255,.75);}
  .bar-lab .num .pct{font-size:26px; font-weight:900; margin-left:4px;}

  /* ===== 結果：2 選項對決 ===== */
  .duel{display:grid; grid-template-columns:1fr auto 1fr; align-items:stretch; gap:0; margin-top:6px;
    min-height:340px;}
  .duel .side{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:30px 18px; border-radius:20px; color:#fff; position:relative;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.14);
  }
  .duel .side.win{box-shadow:inset 0 0 0 4px #fff, 0 0 40px rgba(255,255,255,.15);}
  .duel .side .crown{position:absolute; top:12px; font-size:26px;}
  .duel .pct{font-size:clamp(64px,11vw,120px); font-weight:900; line-height:.95; text-shadow:0 3px 12px rgba(0,0,0,.4);}
  .duel .opt{font-size:26px; margin-top:12px; font-weight:800; text-align:center; text-shadow:0 1px 4px rgba(0,0,0,.4);}
  .duel .votes{font-size:20px; margin-top:6px; opacity:.85; font-weight:700;}
  .duel .vs{display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:900;
    color:var(--muted); padding:0 18px;}

  /* ===== 學生連結（側欄固定面板，不浮動、不會蓋到票數） ===== */
  .join-box{
    background:var(--panel);
    border:1px solid var(--line); border-radius:16px; padding:14px; text-align:center;
    margin-top:14px;
  }
  .join-box .qr{background:#fff; padding:8px; border-radius:10px; display:inline-block; line-height:0;}
  .join-box .lab{font-size:13px; color:var(--muted); margin:8px 0 2px;}
  .join-box .url{font-size:12px; color:var(--c1); word-break:break-all;}

  /* ===== 學生佈局（手機） ===== */
  .student{max-width:560px; margin:0 auto;}
  .student h1{text-align:center;}
  .student .sub{text-align:center;}

  /* 等待入場氛圍 */
  .waiting{text-align:center; padding:40px 16px 30px;}
  .waiting .room-badge{
    display:inline-block; font-size:14px; letter-spacing:3px; color:var(--c3); font-weight:800;
    border:1px solid var(--line); border-radius:999px; padding:7px 20px; margin-bottom:22px;
  }
  .waiting .big{font-size:30px; font-weight:900; margin-bottom:8px;}
  .waiting .m{color:var(--muted); font-size:18px;}
  .waiting .m b{color:#fff; font-size:26px; font-weight:900;}
  .waiting .dots{margin-top:26px; display:flex; gap:10px; justify-content:center;}
  .waiting .dots i{width:12px;height:12px;border-radius:50%;background:var(--c1);animation:bob 1s infinite;}
  .waiting .dots i:nth-child(2){background:var(--c2);animation-delay:.15s;}
  .waiting .dots i:nth-child(3){background:var(--c0);animation-delay:.3s;}
  .waiting .dots i:nth-child(4){background:var(--c3);animation-delay:.45s;}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-10px);opacity:1}}

  /* 滿版色塊按鈕 2×2 自適應 */
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:20px;}
  .opts.one-col{grid-template-columns:1fr;}
  .opt-btn{
    display:flex; align-items:center; gap:14px; text-align:left; color:#fff;
    border:none; border-radius:18px; padding:26px 20px; font-size:24px; font-weight:800;
    min-height:120px; width:100%; position:relative;
    box-shadow:0 8px 0 rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.16);
    transition:transform .1s, box-shadow .1s, filter .12s;
  }
  .opt-btn:active{transform:translateY(5px) scale(.99); box-shadow:0 3px 0 rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.16);}
  .opt-btn.picked{filter:brightness(1.06); box-shadow:0 0 0 4px #fff, 0 8px 0 rgba(0,0,0,.28);}
  .opt-btn.picked::after{content:"✓"; position:absolute; top:10px; right:14px; font-size:26px; font-weight:900;
    text-shadow:0 1px 3px rgba(0,0,0,.4);}
  .opt-btn .k{
    flex:0 0 auto; font-size:34px; font-weight:900; width:38px; text-align:center;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
  }
  .opt-btn .txt{flex:1; text-shadow:0 1px 3px rgba(0,0,0,.35); line-height:1.2;}

  /* 選項配色（背景）— 學生按鈕 + 老師色條 + 長條 fill 共用 */
  .c0{background:var(--c0);} .c1{background:var(--c1);}
  .c2{background:var(--c2);} .c3{background:var(--c3);}
  .c4{background:var(--c4);} .c5{background:var(--c5);}
  /* 字母色鍵（學生舊 .k 保留 class 名，但改為透明由 .cN 上色） */
  .k0,.k1,.k2,.k3{background:transparent;}

  .voted-tag{text-align:center; margin-top:20px; font-size:18px; color:var(--c2); font-weight:800;}
  .youpicked{text-align:center; margin-top:22px; font-size:20px; color:var(--c3); font-weight:800;}

  @media (max-width:720px){
    .host-grid{grid-template-columns:1fr;}
    .join-box{position:static; max-width:none; margin-top:18px;}
    .duel{grid-template-columns:1fr; gap:14px; min-height:0;}
    .duel .vs{padding:6px 0;}
  }
</style>
</head>

  <div id="host" class="hidden"></div>

<script>
/* ================= 共用：URL 參數 / uid ================= */
const params = new URLSearchParams(location.search);
const ROOM = params.get('room') || 'class1';
const IS_HOST = params.get('host') === '1';

function uid(){
  let u = sessionStorage.getItem('vote_uid');
  if(!u){ u = Math.random().toString(36).slice(2,10); sessionStorage.setItem('vote_uid', u); }
  return u;
}
const UID = uid();

/* ================= Transport 抽象 =================
   同介面：send(msg), onMessage(cb), presence（人數回報）。
   兩實作：Supabase Realtime 純 broadcast/presence，或 BroadcastChannel 模擬。 */
let transport = null;

async function makeTransport(onPeers){
  if(SUPABASE.url && SUPABASE.key){
    // ---- Supabase Realtime（僅此模式載入網路模組）----
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const sb = createClient(SUPABASE.url, SUPABASE.key);
    const ch = sb.channel('vote-' + ROOM, { config: { presence: { key: UID } } });
    const cbs = [];
    ch.on('broadcast', { event: 'msg' }, ({ payload }) => cbs.forEach(f => f(payload)));
    ch.on('presence', { event: 'sync' }, () => {
      const state = ch.presenceState();
      const peers = Object.values(state).map(a => a[0]);
      onPeers(peers);
    });
    await new Promise(res => ch.subscribe(async s => {
      if(s === 'SUBSCRIBED'){ await ch.track({ uid: UID, host: IS_HOST }); res(); }
    }));
    return {
      mode: 'supabase',
      send: m => ch.send({ type: 'broadcast', event: 'msg', payload: m }),
      onMessage: f => cbs.push(f)
    };
  }

  // ---- 本機示範模式：BroadcastChannel + 心跳模擬 presence ----
  const bc = new BroadcastChannel('vote-' + ROOM);
  const cbs = [];
  const peers = new Map(); // uid -> {host, last}
  peers.set(UID, { host: IS_HOST, last: Date.now() });

  function report(){ onPeers([...peers].map(([id,v]) => ({ uid:id, host:v.host }))); }

  bc.onmessage = e => {
    const m = e.data;
    if(m.__pres){
      if(m.__pres === 'leave'){ peers.delete(m.uid); }
      else { peers.set(m.uid, { host: m.host, last: Date.now() }); }
      report();
      return;
    }
    cbs.forEach(f => f(m));
  };

  const ping = () => bc.postMessage({ __pres:'ping', uid:UID, host:IS_HOST });
  bc.postMessage({ __pres:'join', uid:UID, host:IS_HOST });
  ping();
  setInterval(ping, 3000);                       // 每 3 秒心跳
  setInterval(() => {                            // 8 秒沒聽到視為離線
    const now = Date.now(); let changed = false;
    for(const [id,v] of peers){ if(id!==UID && now - v.last > 8000){ peers.delete(id); changed = true; } }
    if(changed) report();
  }, 2000);
  window.addEventListener('pagehide', () => bc.postMessage({ __pres:'leave', uid:UID }));
  report();

  return {
    mode: 'local',
    send: m => { bc.postMessage(m); cbs.forEach(f => f(m)); }, // 本機同分頁也收到自己的訊息
    onMessage: f => cbs.push(f)
  };
}

/* ================= QR 繪製（用內嵌 qrcode） ================= */
function drawQR(el, text){
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  const n = qr.getModuleCount(), scale = 4, pad = 2;
  const size = (n + pad*2) * scale;
  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = size;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,size,size);
  ctx.fillStyle = '#000';
  for(let r=0;r<n;r++) for(let c=0;c<n;c++)
    if(qr.isDark(r,c)) ctx.fillRect((c+pad)*scale, (r+pad)*scale, scale, scale);
  el.innerHTML = ''; el.appendChild(cvs);
}

/* ================= 結果圖（老師 / 學生共用） ================= */
function renderResult(container, options, counts, myChoice){
  const total = counts.reduce((a,b)=>a+b, 0) || 1;
  if(options.length === 2){
    const p = counts.map(c => Math.round(c/total*100));
    const win = counts[0] === counts[1] ? -1 : (counts[0] > counts[1] ? 0 : 1);
    container.innerHTML = `
      <div class="duel">
        <div class="side c0 ${win===0?'win':''}">
          ${win===0?'<div class="crown">👑</div>':''}
          <div class="pct">${p[0]}%</div>
          <div class="opt"><b>A</b> ${esc(options[0])}</div>
          <div class="votes">${counts[0]} 票</div>
        </div>
        <div class="vs">VS</div>
        <div class="side c1 ${win===1?'win':''}">
          ${win===1?'<div class="crown">👑</div>':''}
          <div class="pct">${p[1]}%</div>
          <div class="opt"><b>B</b> ${esc(options[1])}</div>
          <div class="votes">${counts[1]} 票</div>
        </div>
      </div>`;
  } else {
    const rows = options.map((o,i)=>{
      const pct = Math.round(counts[i]/total*100);
      return `<div class="bar-item">
        <div class="bar-track">
          <div class="bar-fill c${i%6}" data-w="${pct}"></div>
          <div class="bar-lab">
            <span class="kk">${'ABCD'[i]||i+1}</span>
            <span class="opt">${esc(o)}</span>
            <span class="num"><span class="v">${counts[i]}</span><span class="u">票</span><span class="pct">${pct}%</span></span>
          </div>
        </div>
      </div>`;
    }).join('');
    container.innerHTML = `<div class="bars">${rows}</div>`;
    requestAnimationFrame(()=> container.querySelectorAll('.bar-fill').forEach(b=> b.style.width = b.dataset.w + '%'));
  }
  if(typeof myChoice === 'number' && options[myChoice]!==undefined){
    const tag = document.createElement('div');
    tag.className = 'youpicked';
    tag.textContent = '你投的是：' + options[myChoice];
    container.appendChild(tag);
  }
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================= 啟動 ================= */
(async function init(){
  const banner = document.getElementById('banner');
  let peerList = [];
  let hostPeers = ()=>{}, studentPeers = ()=>{};   // 由 initHost/initStudent 覆寫
  function onPeers(list){ peerList = list; (IS_HOST ? hostPeers : studentPeers)(list); }

  transport = await makeTransport(onPeers);
  if(transport.mode === 'local') banner.classList.remove('hidden');

  if(IS_HOST) initHost();
  else initStudent();

  /* ---------------- 老師 ---------------- */
  function initHost(){
    const root = document.getElementById('host');
    root.classList.remove('hidden');
    root.innerHTML = `
      <h1>即時投票 <span class="hl">· 老師台</span></h1>
      <p class="sub">房間：${esc(ROOM)}　·　${transport.mode==='supabase'?'雲端即時模式':'本機示範模式'}</p>
      <button id="openSide" class="reopen" title="展開題目側欄">☰ 題目</button>
      <div class="host-grid">
        <div class="panel side">
          <div class="ptitle">選一題 <button id="collapseSide" class="fold" title="收合側欄">⟨ 收合</button></div>
          <ul id="qlist" class="qlist"><li>載入題目中…</li></ul>
          <div class="ptitle" style="margin-top:16px;">或自訂題目</div>
          <textarea id="custom" placeholder="第一行：題目&#10;第二行：選項（用逗號分隔）&#10;例如：&#10;你今天午餐吃什麼？&#10;便當,麵,不吃"></textarea>
          <button class="btn ghost" id="useCustom" style="margin-top:10px;font-size:16px;padding:11px 20px;">用這題</button>
          <p class="hint" id="loadHint"></p>
          <div class="join-box">
            <div class="qr" id="qr"></div>
            <div class="lab">學生掃碼加入</div>
            <div class="url" id="joinurl"></div>
          </div>
        </div>
        <div class="panel stage">
          <div class="stat-row">
            <div class="pill live"><span class="dot"></span>在線 <b id="s-online">0</b></div>
            <div class="pill">已投 <b id="s-voted">0</b> / <b id="s-need">0</b></div>
          </div>
          <div id="hstage"></div>
        </div>
      </div>`;

    const joinURL = location.origin + location.pathname + '?room=' + encodeURIComponent(ROOM);
    root.querySelector('#joinurl').textContent = joinURL;
    drawQR(root.querySelector('#qr'), joinURL);

    // 側欄收合／展開（投影時把整個畫面留給舞台）
    root.querySelector('#collapseSide').onclick = () => root.classList.add('side-collapsed');
    root.querySelector('#openSide').onclick = () => root.classList.remove('side-collapsed');

    let current = null;        // {q, options}
    const votes = new Map();   // uid -> choice
    const stage = root.querySelector('#hstage');

    function studentCount(){ return peerListCount(); }
    function peerListCount(){ return peerList.filter(p=>!p.host).length; }

    function updateStats(){
      const online = peerListCount();
      root.querySelector('#s-online').textContent = online;
      root.querySelector('#s-voted').textContent = votes.size;
      root.querySelector('#s-need').textContent = online;
      // 自動開牌：已投 ≥ 在線且在線>0，且尚未開牌
      if(current && !current.revealed && online>0 && votes.size >= online) reveal();
    }
    hostPeers = () => {
      updateStats();
      // 中途加入者重播當前題目
      if(current && !current.revealed) transport.send({ type:'question', q:current.q, options:current.options });
    };

    function showQuestion(q, options){
      current = { q, options, revealed:false };
      votes.clear();
      transport.send({ type:'question', q, options });
      const prebars = options.map((o,i)=>`
        <div class="prebar c${i%6}"><span class="kk">${'ABCD'[i]||i+1}</span><span>${esc(o)}</span></div>`).join('');
      stage.innerHTML = `
        <div class="bigq">${esc(q)}</div>
        <div class="prebars">${prebars}</div>
        <div class="btn-row">
          <button class="btn big" id="reveal">CHECK</button>
          <button class="btn ghost" id="next">下一題</button>
        </div>`;
      stage.querySelector('#reveal').onclick = reveal;
      stage.querySelector('#next').onclick = next;
      updateStats();
    }

    function reveal(){
      if(!current || current.revealed) return;
      current.revealed = true;
      const counts = current.options.map(()=>0);
      votes.forEach(c => { if(counts[c]!==undefined) counts[c]++; });
      current.counts = counts;
      transport.send({ type:'reveal', counts });
      logResult(counts);
      stage.innerHTML = `<div class="bigq">${esc(current.q)}</div><div id="res"></div>
        <div class="btn-row"><button class="btn big" id="next">下一題</button></div>`;
      renderResult(stage.querySelector('#res'), current.options, counts);
      stage.querySelector('#next').onclick = next;
    }

    // 開牌時把統計結果寫進 camp_votes 表（一題一列；失敗靜默，不影響投票）
    function logResult(counts){
      if(!SUPABASE.url || !SUPABASE.key) return;
      fetch(SUPABASE.url + '/rest/v1/camp_votes', {
        method: 'POST',
        headers: {
          apikey: SUPABASE.key,
          Authorization: 'Bearer ' + SUPABASE.key,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({
          room: ROOM,
          question: current.q,
          options: current.options,
          counts,
          online: peerListCount()
        })
      }).catch(()=>{});
    }

    function next(){
      current = null; votes.clear();
      transport.send({ type:'reset' });
      stage.innerHTML = `<div class="hint" style="font-size:20px;padding:40px 0;text-align:center;">← 選一題開始，或用自訂題目。</div>`;
      updateStats();
    }

    transport.onMessage(m => {
      if(m.type === 'vote' && current && !current.revealed){
        votes.set(m.uid, m.choice); updateStats();
      }
      if(m.type === 'hello' && current && !current.revealed){
        transport.send({ type:'question', q:current.q, options:current.options });
      }
    });

    // 自訂題目
    root.querySelector('#useCustom').onclick = () => {
      const lines = root.querySelector('#custom').value.trim().split('\n').filter(l=>l.trim());
      if(lines.length < 2){ alert('請至少輸入一行題目 + 一行選項'); return; }
      const q = lines[0].trim();
      const options = lines[1].split(/[,，]/).map(s=>s.trim()).filter(Boolean);
      if(options.length < 2){ alert('至少要兩個選項（用逗號分隔）'); return; }
      root.querySelectorAll('#qlist li').forEach(li=>li.classList.remove('sel'));
      showQuestion(q, options);
    };

    // 載入題庫（兩種擺法都試：quiz/ 與本頁同層，或在上一層）
    // no-store：繞過瀏覽器與 Pages 的 10 分鐘快取，老師改完題目部署即生效
    fetch('quiz/questions.json', {cache:'no-store'})
      .then(r => { if(!r.ok) throw 0; return r; })
      .catch(() => fetch('../quiz/questions.json', {cache:'no-store'}))
      .then(r => { if(!r.ok) throw 0; return r.json(); })
      .then(data => {
        const list = root.querySelector('#qlist');
        list.innerHTML = '';
        const add = (item, label) => {
          const li = document.createElement('li');
          li.innerHTML = `<span class="tag">${label}</span><br>${esc(item.q)}`;
          li.onclick = () => {
            root.querySelectorAll('#qlist li').forEach(x=>x.classList.remove('sel'));
            li.classList.add('sel');
            showQuestion(item.q, item.options);
          };
          list.appendChild(li);
        };
        (data.warmup||[]).forEach((it,i)=>add(it,`暖身 ${i+1}`));
        (data.literacy||[]).forEach((it,i)=>add(it,`素養 ${i+1}`));
      })
      .catch(()=> {
        root.querySelector('#loadHint').textContent =
          '⚠ 讀不到題庫（可能是用 file:// 開啟）。請改用左下「自訂題目」框，或起一個本機伺服器。';
        root.querySelector('#qlist').innerHTML = '<li>題庫載入失敗</li>';
      });

    next();
  }

  /* ---------------- 學生 ---------------- */
  function initStudent(){
    const root = document.getElementById('student');
    root.classList.add('student');
    root.classList.remove('hidden');
    root.innerHTML = `
      <h1>即時投票</h1>
      <p class="sub">房間：${esc(ROOM)}　·　匿名，不用留名字</p>
      <div id="sstage"></div>`;
    const stage = root.querySelector('#sstage');
    let current = null, myChoice = null;

    function waiting(){
      current = null; myChoice = null;
      stage.innerHTML = `<div class="waiting">
        <div class="room-badge">房間 ${esc(ROOM)}</div>
        <div class="big">已加入！等老師出題</div>
        <div class="m">在線 <b id="cnt">0</b> 人</div>
        <div class="dots"><i></i><i></i><i></i><i></i></div>
      </div>`;
    }
    studentPeers = list => {
      const c = list.filter(p=>!p.host).length;
      const el = stage.querySelector('#cnt'); if(el) el.textContent = c;
    };

    function showQuestion(q, options){
      if(current && current.q === q) return; // 重播同題不覆蓋已選狀態
      current = { q, options }; myChoice = null;
      const opts = options.map((o,i)=>`
        <button class="opt-btn c${i%6}" data-i="${i}">
          <span class="k k${i}">${'ABCD'[i]||i+1}</span><span class="txt">${esc(o)}</span>
        </button>`).join('');
      // 奇數選項用單欄避免尾巴孤塊；偶數維持 2×2 滿版
      stage.innerHTML = `<div class="bigq">${esc(q)}</div>
        <div class="opts${options.length%2?' one-col':''}">${opts}</div>
        <div class="voted-tag hidden" id="vtag">已投票 ✓　可以改票</div>`;
      stage.querySelectorAll('.opt-btn').forEach(b => b.onclick = () => {
        myChoice = +b.dataset.i;
        stage.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('picked'));
        b.classList.add('picked');
        stage.querySelector('#vtag').classList.remove('hidden');
        transport.send({ type:'vote', choice: myChoice, uid: UID });
      });
    }

    transport.onMessage(m => {
      if(m.type === 'question') showQuestion(m.q, m.options);
      else if(m.type === 'reset') waiting();
      else if(m.type === 'reveal' && current){
        stage.innerHTML = `<div class="bigq">${esc(current.q)}</div><div id="res"></div>`;
        renderResult(stage.querySelector('#res'), current.options, m.counts, myChoice);
      }
    });

    waiting();
    transport.send({ type:'hello' }); // 加入時請 host 回覆當前狀態
  }
})();
</script>
</body>
</html>
